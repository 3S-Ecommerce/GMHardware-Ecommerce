<section>
  <h2 id="editarAdministradorTitulo" class="enderecos-title">Editar Administrador</h2>
  
  <div class="enderecos-list">
    <div class="endereco-item form-card">
      @if(dados()){
        <form [formGroup]="formAdmin" (ngSubmit)="onSubmit()">
            
          <div class="div-input w100">
            <label id="editarAdministradorLabelNome" for="name" class="form-label">Nome:</label>
            <input type="text" formControlName="name" id="name" placeholder="Pedro Gregorio" [value]="dados().name" class="form-input" required>
          </div>
          
          <div class="div-input w100">
            <label id="editarAdministradorLabelEmail" for="email" class="form-label">Email:</label>
            <input type="text" formControlName="email" id="email" placeholder="pedro@email.com" class="form-input" required>
          </div>
          
          <div class="div-input w50">
            <label id="editarAdministradorLabelSenha" for="password" class="form-label">Senha:</label>
            <input type="password" formControlName="password" id="password" placeholder="Deixe em branco para não alterar" class="form-input">
          </div>
          
          <div class="div-input w50">
            <label id="editarAdministradorLabelConfirmeSenha" for="password_confirmation" class="form-label">Confirme a senha:</label>
            <input type="password" formControlName="password_confirmation" id="password_confirmation" placeholder="Confirme a nova senha" class="form-input">
          </div>
          
          <div class="div-input w100">
            <label id="editarAdministradorLabelTelefone" for="phone_number" class="form-label">Telefone:</label>
            <input type="text" formControlName="phone_number" id="phone_number" placeholder="11912341234" class="form-input">
          </div>
          
          <div class="div-input w70">
            <label id="editarAdministradorLabelDocumento" for="document" class="form-label">Documento:</label>
            <input type="text" formControlName="document" id="document" placeholder="31029081787" class="form-input">
          </div>
          
          <div class="div-input w30">
            <label id="editarAdministradorLabelAtivo" for="active" class="form-label">Ativo:</label>
            <select formControlName="active" id="active" class="form-input">
              <option id="editarAdministradorOpcaoSim" value="1">Sim</option>
              <option id="editarAdministradorOpcaoNao" value="2">Não</option>
            </select>
          </div>
          
          <div class="form-actions">
            <a id="editarAdministradorBotaoVoltar" routerLink="/admin/administradores" class="endereco-excluir btn-cancel">Voltar</a>
            <button id="editarAdministradorBotaoSalvar" [disabled]="formAdmin.invalid" type="submit" class="btn-adicionar btn-submit">Salvar</button>
          </div>

        </form>
      }
    </div>
  </div>
</section>
