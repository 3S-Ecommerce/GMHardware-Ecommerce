<section class="section-administradores">
  <div class="table-header">
    <h2 class="enderecos-title" id="geralAdministradoresTitulo">Administradores</h2>
    <button routerLink="novo" class="btn-adicionar" id="geralNovoAdministrador">
      <span class="btn-icon">+</span> Novo Administrador
    </button>
  </div>

  <div class="table-responsive">
    <table>
      <thead>
        <tr>
          <th id="geralIdAdm" class="col-id">ID</th>
          <th id="geralAdministrador" class="col-name">Administrador</th>
          <th id="geralAdmCadastrado" class="col-date">Cadastrado</th>
          <th id="geralAtivoAdm" class="col-status">Ativo</th>
          <th id="geralAcoesAdm" class="col-actions">Ações</th>
        </tr>
      </thead>
      <tbody>
        @if(admins()){
          @for (admin of admins(); track admin.id){
            <tr>
              <td class="col-id">{{ admin.id }}</td>
              <td class="col-name name-cell">{{ admin.name }}</td>
              <td class="col-date">{{ admin.created_at | date: 'dd/MM/yyyy'}}</td>
              <td class="col-status">
                @if(admin.active == 1){
                  <span id="respostaAtivo" class="status-badge active">Ativo</span>
                }@else {
                  <span id="respostaInativo" class="status-badge inactive">Inativo</span>
                }
              </td>
              <td class="col-actions acoes">
                <a [routerLink]="['editar', admin.id]" class="action-btn edit" title="Editar">
                  <i class="fa-solid fa-pen"></i>
                </a>
                <a routerLink="deletar" class="action-btn delete" title="Excluir">
                  <i class="fa-solid fa-trash"></i>
                </a>
              </td>
            </tr>
          }
        }
      </tbody>
    </table>
  </div>
</section>
