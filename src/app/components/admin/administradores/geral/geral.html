<section class="section-administradores">
    <div>
        <h2>Administradores</h2>
        <button routerLink="novo">Novo Administrador</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Administrador</th>
                <th>Cadastrado</th>
                <th>Ativo</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            @if(admins()){

            @for (admin of admins(); track admin.id){

            <tr>
                <td>{{ admin.id }}</td>
                <td>{{ admin.name }}</td>
                <td>{{ admin.created_at | date: 'dd/MM/yyyy'}}</td>
                <td>@if(admin.active == 1){Ativo}@else {Inativo}</td>
                <td class="acoes"><a [routerLink]="['editar', {id: admin.id}]"><i class="fa-solid fa-pen"></i></a><a routerLink="deletar"><i class="fa-solid fa-trash"></i></a></td>
            </tr>   

            }

            }
        </tbody>
    </table>
</section>
