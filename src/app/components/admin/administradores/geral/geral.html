<section class="section-administradores">
    <div>
        <h2 i18n id="tituloGeralAdm">Administradores</h2>
        <button routerLink="novo" i18n id="btnNovoAdm">Novo Administrador</button>
    </div>
    <table>
        <thead>
            <tr>
                <th i18n id="geralIdAdm">ID</th>
                <th i18n id="geralAdministrador">Administrador</th>
                <th i18n id="geralAdmCadastrado">Cadastrado</th>
                <th i18n id="geralAtivoAdm">Ativo</th>
                <th i18n id="geralAcoesAdm">Ações</th>
            </tr>
        </thead>
        <tbody>
            @if(admins()){

            @for (admin of admins(); track admin.id){

            <tr>
                <td>{{ admin.id }}</td>
                <td>{{ admin.name }}</td>
                <td>{{ admin.created_at | date: 'dd/MM/yyyy'}}</td>
                <td>
                    @if(admin.active == 1){<span i18n id="respostaAtivo">Ativo</span>}
                    @else {<span i18n id="respostaInativo">Inativo</span>}
                </td>
                <td class="acoes">
                    <a [routerLink]="['editar', {id: admin.id}]"><i class="fa-solid fa-pen"></i></a>
                    <a routerLink="deletar"><i class="fa-solid fa-trash"></i></a>
                </td>
            </tr>   

            }

            }
        </tbody>
    </table>
</section>
