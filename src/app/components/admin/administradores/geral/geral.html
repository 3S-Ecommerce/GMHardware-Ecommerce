<section class="section-administradores">
    <div>
        <h2 i18n>Administradores</h2>
        <button routerLink="novo" i18n>Novo Administrador</button>
    </div>
    <table>
        <thead>
            <tr>
                <th i18n>ID</th>
                <th i18n>Administrador</th>
                <th i18n>Cadastrado</th>
                <th i18n>Ativo</th>
                <th i18n>Ações</th>
            </tr>
        </thead>
        <tbody>
            @if(admins()){

            @for (admin of admins(); track admin.id){

            <tr>
                <td>{{ admin.id }}</td>
                <td>{{ admin.name }}</td>
                <td>{{ admin.created_at | date: 'dd/MM/yyyy'}}</td>
                <td>
                    @if(admin.active == 1){<span i18n>Ativo</span>}
                    @else {<span i18n>Inativo</span>}
                </td>
                <td class="acoes">
                    <a [routerLink]="['editar', {id: admin.id}]"><i class="fa-solid fa-pen"></i></a>
                    <a routerLink="deletar"><i class="fa-solid fa-trash"></i></a>
                </td>
            </tr>   

            }

            }
        </tbody>
    </table>
</section>
