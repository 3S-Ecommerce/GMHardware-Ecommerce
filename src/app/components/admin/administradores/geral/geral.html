<section class="section-administradores">
    <div>
        <h2 id="tituloGeralAdm">Administradores</h2>
        <button routerLink="novo" id="btnNovoAdm">Novo Administrador</button>
    </div>
    <table>
        <thead>
            <tr>
                <th id="geralIdAdm">ID</th>
                <th id="geralAdministrador">Administrador</th>
                <th id="geralAdmCadastrado">Cadastrado</th>
                <th id="geralAtivoAdm">Ativo</th>
                <th id="geralAcoesAdm">Ações</th>
            </tr>
        </thead>
        <tbody>
            @if(admins()){

            @for (admin of admins(); track admin.id){

            <tr>
                <td>{{ admin.id }}</td>
                <td>{{ admin.name }}</td>
                <td>{{ admin.created_at | date: 'dd/MM/yyyy'}}</td>
                <td>@if(admin.active == 1){<span id="respostaAtivo">Ativo</span>}@else {<span id="respostaInativo" >Inativo</span>}</td>
                <td class="acoes">
                    <a [routerLink]="['editar', admin.id]"><i class="fa-solid fa-pen"></i></a>
                    <a routerLink="deletar"><i class="fa-solid fa-trash"></i></a></td>
            </tr>

            }

            }
        </tbody>
    </table>
</section>
