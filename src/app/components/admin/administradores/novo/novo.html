<section>
    <h2 i18n id="novoCadastrarAdministrador">Cadastrar Administrador</h2>
    <div class="form-admin">
        <form [formGroup]="formAdmin" (ngSubmit)="onSubmit()">
            
            <div class="div-input w100">
                <label for="name" i18n id="novoNome">Nome:</label>
                <input type="text" formControlName="name" id="name" i18n-placeholder="@@novoPlaceholderNome" placeholder="Pedro Gregorio" required>
            </div>
            
            <div class="div-input w100">
                <label for="email" i18n id="novoEmail">Email:</label>
                <input type="text" formControlName="email" id="email" placeholder="pedro@email.com" required>
            </div>
            
            <div class="div-input w50">
                <label for="password" i18n id="novoSenha">Senha:</label>
                <input type="password" formControlName="password" id="password" placeholder="password" required>
            </div>
            
            <div class="div-input w50">
                <label for="password_confirmation" i18n id="novoConfirmeSenha">Confirme a senha:</label>
                <input type="password" formControlName="password_confirmation" id="password_confirmation" placeholder="password" required>
            </div>
            
            <div class="div-input w100">
                <label for="phone_number" i18n id="novoTelefone">Telefone:</label>
                <input type="text" formControlName="phone_number" id="phone_number" placeholder="11912341234">
            </div>
            
            <div class="div-input w70">
                <label for="document" i18n id="novoDocumento">Documento:</label>
                <input type="text" formControlName="document" id="document" placeholder="31029081787" required>
            </div>
            
            <div class="div-input w30">
                <label for="active" i18n id="novoAtivo">Ativo:</label>
                <select formControlName="active" id="active">
                    <option value="1" i18n id="novoOpcaoSim">Sim</option>
                    <option value="2" i18n id="novoOpcaoNao">Não</option>
                </select>
            </div>
            
            <div class="button">
                <a routerLink="/finalizar-compra" class="voltar" i18n id="novoVoltar">Voltar</a>
                <button [disabled]="formAdmin.invalid" type="submit" i18n id="novoSalvar">Salvar</button>
            </div>
        </form>
    </div>
</section>
