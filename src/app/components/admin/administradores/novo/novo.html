<section>
  <h2 id="novoCadastrarAdministrador" class="enderecos-title">Cadastrar Administrador</h2>
  
  <div class="enderecos-list">
    <div class="endereco-item form-card">
      <form [formGroup]="formAdmin" (ngSubmit)="onSubmit()">
          
        <div class="div-input w100">
          <label id="novoNome" for="name" class="form-label">Nome:</label>
          <input type="text" formControlName="name" id="name" placeholder="Pedro Gregorio" class="form-input" required>
        </div>
        
        <div class="div-input w100">
          <label id="novoEmail" for="email" class="form-label">Email:</label>
          <input type="text" formControlName="email" id="email" placeholder="pedro@email.com" class="form-input" required>
        </div>
        
        <div class="div-input w50">
          <label id="novoSenha" for="password" class="form-label">Senha:</label>
          <input type="password" formControlName="password" id="password" placeholder="password" class="form-input" required>
        </div>
        
        <div class="div-input w50">
          <label id="novoConfirmeSenha" for="password_confirmation" class="form-label">Confirme a senha:</label>
          <input type="password" formControlName="password_confirmation" id="password_confirmation" placeholder="password" class="form-input" required>
        </div>
        
        <div class="div-input w100">
          <label id="novoTelefone" for="phone_number" class="form-label">Telefone:</label>
          <input type="text" formControlName="phone_number" id="phone_number" placeholder="11912341234" class="form-input">
        </div>
        
        <div class="div-input w70">
          <label id="novoDocumento" for="document" class="form-label">Documento:</label>
          <input type="text" formControlName="document" id="document" placeholder="31029081787" class="form-input" required>
        </div>
        
        <div class="div-input w30">
          <label id="novoAtivo" for="active" class="form-label">Ativo:</label>
          <select formControlName="active" id="active" class="form-input">
            <option id="novoOpcaoSim" value="1">Sim</option>
            <option id="novoOpcaoNao" value="2">Não</option>
          </select>
        </div>
        
        <div class="form-actions">
          <a id="novoVoltar" routerLink="/admin/administradores" class="endereco-excluir btn-cancel">Voltar</a>
          <button id="novoSalvar" [disabled]="formAdmin.invalid" type="submit" class="btn-adicionar btn-submit">Salvar</button>
        </div>

      </form>
    </div>
  </div>
</section>
