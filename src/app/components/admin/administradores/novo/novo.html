<section>
    <h2>Cadastrar Administrador</h2>
    <div class="form-admin">
        <form [formGroup]="formAdmin" (ngSubmit)="onSubmit()">
            
            <div class="div-input w100">
                <label for="name">Nome:</label>
                <input type="text" formControlName="name" id="name" placeholder="Pedro Gregorio" required>
            </div>
            
            <div class="div-input w100">
                <label for="email">Email:</label>
                <input type="text" formControlName="email" id="email" placeholder="pedro@email.com" required>
            </div>
            
            <div class="div-input w50">
                <label for="password">Senha:</label>
                <input type="password" formControlName="password" id="password" placeholder="password" required>
            </div>
            
            <div class="div-input w50">
                <label for="password_confirmation">Confirme a senha:</label>
                <input type="password" formControlName="password_confirmation" id="password_confirmation" placeholder="password" required>
            </div>
            
            <div class="div-input w100">
                <label for="phone_number">Telefone:</label>
                <input type="text" formControlName="phone_number" id="phone_number" placeholder="11912341234">
            </div>
            
            <div class="div-input w70">
                <label for="document">Documento:</label>
                <input type="text" formControlName="document" id="document" placeholder="31029081787" required>
            </div>
            
            <div class="div-input w30">
                <label for="active">Ativo:</label>
                <select formControlName="active" id="active">
                    <option value="1">Sim</option>
                    <option value="2">Não</option>
                </select>
            </div>
            
            <div class="button">
                <a routerLink="/finalizar-compra" class="voltar">Voltar</a>
                <button [disabled]="formAdmin.invalid" type="submit">Salvar</button>
            </div>
        </form>
    </div>
</section>
