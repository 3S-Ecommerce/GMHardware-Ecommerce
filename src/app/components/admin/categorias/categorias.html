<section>
    <h2 id="novoCategoriaTitulo">Cadastrar Categoria</h2>
    <div class="form-admin">
        <form [formGroup]="formCategory" (ngSubmit)="onSubmit()">
            <div class="div-input w100">
                <label for="name" id="novoCategoriaNome">Nome da categoria:</label>
                <input type="text" formControlName="name" id="name" placeholder="Exemplo: Hardware" required>
            </div>

            <div class="button">
                <a routerLink="/admin" class="voltar" id="novoCategoriaVoltar">Voltar</a>
                <button [disabled]="formCategory.invalid" type="submit" id="novoCategoriaSalvar">Salvar</button>
            </div>
        </form>

        <div class="w100" style="margin-top: 40px; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 24px;">
            <h3 style="color: white; font-size: 24px; margin-bottom: 16px; font-weight: 600;">Categorias Cadastradas</h3>

            <div style="overflow-x: auto; width: 100%;">
                <table style="width: 100%; border-collapse: collapse; color: white; font-size: 18px;">
                    <thead>
                        <tr style="border-bottom: 2px solid rgba(255, 255, 255, 0.2); text-align: left;">
                            <th style="padding: 12px 8px; font-weight: 600;">ID</th>
                            <th style="padding: 12px 8px; font-weight: 600;">Nome</th>
                            <th style="padding: 12px 8px; font-weight: 600; text-align: center;">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        @for (categoria of categorias(); track categoria.id) {
                            <tr style="border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
                                <td style="padding: 12px 8px; color: rgba(255, 255, 255, 0.7);">#{{ categoria.id }}</td>
                                <td style="padding: 12px 8px; font-weight: 500;">{{ categoria.name }}</td>
                                <td style="padding: 12px 8px; text-align: center;">
                                    <button
                                        type="button"
                                        (click)="deletarCategoria(categoria.id, categoria.name)"
                                        style="background-color: #e74c3c; color: white; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-weight: 600; font-size: 14px; transition: background 0.2s;"
                                        onmouseover="this.style.backgroundColor='#c0392b'"
                                        onmouseout="this.style.backgroundColor='#e74c3c'">
                                        Excluir
                                    </button>
                                </td>
                            </tr>
                        } @empty {
                            <tr>
                                <td colspan="3" style="padding: 24px; text-align: center; color: rgba(255, 255, 255, 0.5);">
                                    Nenhuma categoria cadastrada.
                                </td>
                            </tr>
                        }
                    </tbody>
                </table>
            </div>
        </div>
        </div>
</section>
