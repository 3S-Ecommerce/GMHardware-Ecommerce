<section>
    <h2 id="editarProdutosTitulo">Editar Produto</h2>
    <div class="form-admin">
        <form [formGroup]="formProduct" (ngSubmit)="onSubmit()">
            
            <div class="div-input w60">
                <label for="name" id="editarProdutosNome">Nome do produto:</label>
                <input type="text" formControlName="name" id="name" placeholder="Exemplo produto" required>
            </div>
            
            <div class="div-input w40">
                <label for="category" id="editarProdutosCategoria">Categoria:</label>
                <select formControlName="id_category" id="category">
                    @if(categorias()){
                        @for(categoria of categorias(); track categoria.id){
                            <option value="{{ categoria.id }}">{{ categoria.name }}</option>
                        }
                    }
                </select>
            </div>
            
            <div class="div-input w30">
                <label for="price" id="editarProdutosPreco">Preço:</label>
                <input type="number" formControlName="price" id="price" placeholder="Preço">
            </div>
            
            <div class="div-input w30">
                <label for="stock" id="editarProdutosEstoque">Itens em estoque:</label>
                <input type="number" formControlName="stock" id="stock" placeholder="ex. 10">
            </div>
            
            <div class="div-input w30">
                <label for="image" id="editarProdutosImagem">Imagem Principal:</label>
                <input type="file" id="image" (change)="onFileChange($event, 'image')">
            </div>

            <div class="div-input w30">
                <label for="image_2">Imagem 2:</label>
                <input type="file" id="image_2" (change)="onFileChange($event, 'image_2')">
            </div>

            <div class="div-input w30">
                <label for="image_3">Imagem 3:</label>
                <input type="file" id="image_3" (change)="onFileChange($event, 'image_3')">
            </div>

            <div class="div-input w30">
                <label for="image_4">Imagem 4:</label>
                <input type="file" id="image_4" (change)="onFileChange($event, 'image_4')">
            </div>

            <div class="div-input w30">
                <label for="image_5">Imagem 5:</label>
                <input type="file" id="image_5" (change)="onFileChange($event, 'image_5')">
            </div>
            
            <div class="div-input w100">
                <label for="description" id="editarProdutosDescricao">Descrição:</label>
                <textarea formControlName="description" id="description" placeholder="Descrição do produto" rows="3"></textarea>
            </div>
            
            <div id="div-details" class="div-input w100" formArrayName="details">
                <label for="details" id="editarProdutosDetalhe">Detalhes:</label>   
                @for (detalhe of detalhesFormArray.controls; track $index){
                    <input class="details" type="text" [formControlName]="$index" placeholder="Especificações" style="margin-bottom: 8px;">
                }
            </div>
            
            <div class="div-input w100 button">
                <p class="p" (click)="novoDetalhe()" id="editarProdutosBtnNovoDetalhe">Novo detalhe</p> 
            </div>
            
            <div class="button">
                <a routerLink="/finalizar-compra" class="voltar" id="editarProdutosVoltar">Voltar</a>
                <button [disabled]="formProduct.invalid" type="submit" id="editarProdutosSalvar">Salvar</button>
            </div>
        </form>
    </div>
</section>
