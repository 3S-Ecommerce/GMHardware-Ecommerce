<div class="conteudo-login">
  <p id="baseLoginCadastroBoasVindas">Seja bem vindo ao GMHardware</p>

  <form [formGroup]="formRegister" (ngSubmit)="onSubmit()">
    <div class="campo-nome alinhar">
      <label id="baseLoginCadastroNomeCompleto" for="name">Nome Completo:</label>
      <input type="text" id="name" formControlName="name" placeholder="Digite seu nome completo">
    </div>

    <div class="campo-email alinhar">
      <label id="baseLoginCadastroEmail" for="email">Email:</label>
      <input type="email" id="email" formControlName="email" placeholder="Digite seu email">
    </div>

    <div class="linha-dupla">
      <div class="campo-documento alinhar">
        <label id="baseLoginCadastroDocumento" for="document">CPF ou CNPJ:</label>
        <input type="text" id="document" formControlName="document" placeholder="Digite apenas números">
      </div>

      <div class="campo-telefone alinhar">
        <label id="baseLoginCadastroTelefone" for="phone_number">Telefone:</label>
        <input type="text" id="phone_number" formControlName="phone_number" placeholder="Digite seu celular com DDD">
      </div>
    </div>

    <div class="campo-endereco alinhar">
      <label id="baseLoginCadastroEnderecoCobranca" for="address">Endereço de Cobrança:</label>
      <input type="text" id="address" formControlName="address" placeholder="Rua, Número, Bairro, Cidade - UF">
    </div>

    <div class="linha-dupla">
      <div class="campo-senha alinhar">
        <label id="baseLoginCadastroSenha" for="senha">Senha:</label>
        <input type="password" id="senha" formControlName="password" placeholder="Digite sua senha">
      </div>

      <div class="campo-comfirmar-senha alinhar">
        <label id="baseLoginCadastroConfirmarSenha" for="confirmSenha">Confirmar Senha:</label>
        <input type="password" id="confirmSenha" formControlName="password_confirmation" placeholder="Confirme sua senha">
      </div>
    </div>

    <div class="termos">
      <input type="checkbox" id="termos" class="caixa-termo">
      <label id="baseLoginCadastroTermos" for="termos">Li e concordo com os termos</label>
    </div>

    <div class="button">
      <button type="submit" class="cadastrar" [disabled]="formRegister.invalid || cadastrando()">
        @if (cadastrando()) {
          <div class="spinner-container">
            <span class="spinner"></span>
            <span id="baseLoginCadastroCriandoConta">Criando conta...</span>
          </div>
        } @else {
          <span id="baseLoginCadastroBtnCadastrar">Cadastrar</span>
        }
      </button>
    </div>
  </form>
</div>
