<div class="conteudo-login">
  <p id="baseLoginCadastroBoasVindas">Seja bem vindo ao GMHardware</p>
  <form action="" method="post">
    <div class="campo-email alinhar">
      <label for="email" id="baseLoginCadastroEmail">Email:</label>
      <input type="email" placeholder="Digite seu email">
    </div>
    <div class="campo-senha alinhar">
      <label for="senha" id="baseLoginCadastroSenha">Senha:</label>
      <input type="password" placeholder="Digite sua senha">
    </div>
    <div class="campo-comfirmar-senha alinhar">
      <label for="senha" id="baseLoginCadastroConfirmarSenha">Confirmar Senha:</label>
      <input type="password" placeholder="Confirme sua senha">
      <div class="termos">
          <input type="checkbox" name="termos" id="termos" class="caixa-termo">
          <label for="termos" id="baseLoginCadastroTermos">Li e concordo com os termos</label>
      </div>
    </div>
  </form>
  <div class="button">
    <button type="button" class="cadastrar" id="baseLoginCadastroBtnCadastrar">Cadastrar</button>
  </div>
</div>
