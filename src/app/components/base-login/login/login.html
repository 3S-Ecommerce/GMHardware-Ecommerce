<div class="conteudo-login">
  <p id="baseLoginLoginBoasVindas">Seja bem vindo ao GMHardware</p>
  <form action="" method="post">
    <div class="campo-email alinhar">
      <label for="email" id="baseLoginLoginEmail">Email:</label>
      <input type="email" placeholder="Digite seu email">
    </div>
    <div class="campo-senha alinhar">
      <label for="senha" id="baseLoginLoginSenha">Senha:</label>
      <input type="password" placeholder="Digite sua senha">
      <a href="" class="esqueceu-sua-senha" id="baseLoginLoginEsqueceuSenha">Esqueceu sua Senha?</a>
    </div>
  </form>
  <div class="buttons">
    <button routerLink="/cadastro" class="cadastrar" id="baseLoginLoginBtnCadastrar">Cadastrar</button>
    <button type="button" class="login" id="baseLoginLoginBtnLogin">Login</button>
  </div>
</div>
