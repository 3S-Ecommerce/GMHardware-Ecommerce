<div class="conteudo-login">
  <p id="baseLoginNovaSenhaBoasVindas">Seja bem vindo ao GMHardware</p>
  <form action="" method="post">
    <div class="campo-email alinhar">
      <label for="email" id="baseLoginNovaSenhaEmail">Email:</label>
      <input type="email" placeholder="Digite seu email">
    </div>
    <div class="campo-senha alinhar">
      <label for="senha" id="baseLoginNovaSenhaSenha">Senha:</label>
      <input type="password" placeholder="Digite sua senha">
    </div>
    <div class="campo-comfirmar-senha alinhar">
      <label for="senha" id="baseLoginNovaSenhaConfirmarSenha">Confirmar Nova Senha:</label>
      <input type="password" placeholder="Confirme sua nova senha">
    </div>
  </form>
  <div class="button">
    <button type="button" class="nova-senha" id="baseLoginNovaSenhaBtnNovaSenha">Nova Senha</button>
  </div>
</div>
