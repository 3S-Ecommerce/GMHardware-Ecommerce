<div class="cards-produtos">
    @for(item of produtos(); track item.id){
    @if(item.categoria == categoria){
    <div class="card-produto">
        <img ngSrc="/assets/main.jpg" alt="Imagem do produto" width="360" height="360" >
        <span>Avaliações: 4.8(243)</span>
        <h4>{{ item.nome }}</h4>
        <p><span>R$</span>{{ item.preco }}</p>
        <div class="card-buttons">
            <button class="carrinho"><i class="fa-solid fa-cart-arrow-down" aria-label="icone de carrinho"></i>
                Carrinho</button>
            <button class="comprar">Comprar</button>
        </div>
    </div>
    }@else if (categoria === 'todos') {
    <div class="card-produto">
        <img ngSrc="/assets/main.jpg" alt="Imagem do produto" width="360" height="360">
        <span>Avaliações: 4.8(243)</span>
        <h4>{{ item.nome }}</h4>
        <p><span>R$</span>{{ item.preco }}</p>
        <div class="card-buttons">
            <button class="carrinho"><i class="fa-solid fa-cart-arrow-down" aria-label="icone de carrinho"></i>
                Carrinho</button>
            <button class="comprar">Comprar</button>
        </div>
    </div>
    }
    }
</div>
