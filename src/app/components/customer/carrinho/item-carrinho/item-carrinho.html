@for (item of produtos(); track item.id) {
  <div class="item-carrinho-row">
    
    <div class="infos">
      <!-- Seletor de Quantidade -->
      <div class="quantidade">
        <button type="button" class="fa-solid fa-arrow-left btn-qty" (click)="menosProduto(item.id)" aria-label="Diminuir quantidade"></button>
        <span class="qty-number">{{ item.quantity }}</span>
        <button type="button" class="fa-solid fa-arrow-right btn-qty" (click)="maisProduto(item.id)" aria-label="Aumentar quantidade"></button>
      </div>
      
      <!-- Container Otimizado da Imagem -->
      <div class="wrapper-img">
        <img [ngSrc]="item.image" alt="Imagem do produto" fill class="produto-img">
      </div>
      
      <!-- Dados do Produto -->
      <div class="dados">
        <h3>{{ item.name }}</h3>
        <p class="preco"><span>R$</span>{{ item.price }}</p>
      </div>
    </div>
    
    <!-- Ações do Item (IDs Dinâmicos) -->
    <div class="buttons">
      <button type="button" class="btn-excluir" (click)="apagarItem(item.id)" [id]="'itemCarrinhoBtnExcluir-' + item.id">
        Excluir
      </button>
      <button type="button" class="comprar" [routerLink]="['/finalizar-compra', { id: item.id}]" [id]="'itemCarrinhoBtnComprar-' + item.id">
        Comprar
      </button>
    </div>

  </div>
} @empty {
  <div class="carrinho-vazio-container">
    <h1 class="carrinho-vazio-mensagem" id="itemCarrinhoNenhumEncontrado">
      Nenhum item adicionado no carrinho
    </h1>
  </div>
}
