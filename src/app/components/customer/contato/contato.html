<app-header></app-header>
<main>
    <section id="contato-section">
        <h2 id="contatoTitulo">Fale Conosco</h2>
        
        <div class="contato-container">
            <div class="contato-info">
                <h3 id="contatoCanaisTitulo">Canais de Atendimento</h3>
                <p id="contatoCanaisDescricao">Escolha a forma mais conveniente para falar com nossa equipe técnica:</p>
                <ul>
                    <li><strong id="contatoEmailLabel">E-mail:</strong> suporte@gmhardware.com.br</li>
                    <li><strong id="contatoWhatsappLabel">WhatsApp:</strong> (11) 99999-9999</li>
                    <li><strong id="contatoHorarioLabel">Horário:</strong> Segunda a Sexta, das 09h às 18h</li>
                </ul>
            </div>

            <div class="contato-form-div">
                <form>
                    <div class="form-group">
                        <label id="contatoNomeCompletoLabel" for="nome">Nome Completo</label>
                        <input type="text" id="nome" placeholder="Digite seu nome">
                    </div>
                    <div class="form-group">
                        <label id="contatoEmailFormularioLabel" for="email">E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label id="contatoAssuntoLabel" for="assunto">Assunto</label>
                        <select id="assunto">
                            <option id="contatoOpcaoDuvidasProdutos" value="duvidas">Dúvidas sobre Produtos</option>
                            <option id="contatoOpcaoStatusPedido" value="pedidos">Status do Pedido</option>
                            <option id="contatoOpcaoGarantiaTrocas" value="garantia">Garantia e Trocas</option>
                            <option id="contatoOpcaoOutrosAssuntos" value="outros">Outros Assuntos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label id="contatoMensagemLabel" for="mensagem">Mensagem</label>
                        <textarea id="mensagem" rows="5" placeholder="Como podemos ajudar?"></textarea>
                    </div>
                    <button id="contatoBotaoEnviarMensagem" type="submit" class="btn-enviar">Enviar Mensagem</button>
                </form>
            </div>
        </div>
    </section>
</main>
<app-footer></app-footer>
