<app-header></app-header>
<main>
    <section id="contato-section">
        <h2>Fale Conosco</h2>
        
        <div class="contato-container">
            <div class="contato-info">
                <h3>Canais de Atendimento</h3>
                <p>Escolha a forma mais conveniente para falar com nossa equipe técnica:</p>
                <ul>
                    <li><strong>E-mail:</strong> suporte@gmhardware.com.br</li>
                    <li><strong>WhatsApp:</strong> (11) 99999-9999</li>
                    <li><strong>Horário:</strong> Segunda a Sexta, das 09h às 18h</li>
                </ul>
            </div>

            <div class="contato-form-div">
                <form>
                    <div class="form-group">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" placeholder="Digite seu nome">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="assunto">Assunto</label>
                        <select id="assunto">
                            <option value="duvidas">Dúvidas sobre Produtos</option>
                            <option value="pedidos">Status do Pedido</option>
                            <option value="garantia">Garantia e Trocas</option>
                            <option value="outros">Outros Assuntos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="mensagem">Mensagem</label>
                        <textarea id="mensagem" rows="5" placeholder="Como podemos ajudar?"></textarea>
                    </div>
                    <button type="submit" class="btn-enviar">Enviar Mensagem</button>
                </form>
            </div>
        </div>
    </section>
</main>
<app-footer></app-footer>
