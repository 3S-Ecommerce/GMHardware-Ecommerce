<div class="fundo">
  <div class="fundo-div">
    <h1>GMHardware</h1>
    <div class="perfil-container">
      
      <form [formGroup]="formComplementar" (ngSubmit)="salvarDadosAdicionais()" class="perfil-card">
        
        <div class="avatar-section">
          <i class="fa-solid fa-truck-fast"></i>
          <h2>Quase lá!</h2>
          <p>Confirme o seu nome e preencha as informações para validar as suas entregas e notas fiscais.</p>
        </div>

        <hr class="divisor">

        <div class="dados-section">
          <h3>Dados de Entrega e Faturamento</h3>

          <div class="campo-dado-input">
            <label><i class="fa-solid fa-user"></i> Nome Completo</label>
            <input type="text" formControlName="name" class="input-perfil" placeholder="Confirme o seu nome completo">
          </div>

          <div class="campo-dado-input">
            <label><i class="fa-solid fa-address-card"></i> CPF ou CNPJ</label>
            <input type="text" formControlName="document" class="input-perfil" placeholder="Apenas números">
          </div>

          <div class="campo-dado-input">
            <label><i class="fa-solid fa-phone"></i> Telefone / Whatsapp</label>
            <input type="text" formControlName="phone_number" class="input-perfil" placeholder="Ex: 11999999999">
          </div>

          <div class="campo-dado-input">
            <label><i class="fa-solid fa-location-dot"></i> Endereço Completo</label>
            <input type="text" formControlName="address" class="input-perfil" placeholder="Rua, Número, Bairro, Cidade - UF">
          </div>
        </div>

        <div class="acoes-perfil">
          <button type="submit" class="btn-salvar" [disabled]="formComplementar.invalid">
            <i class="fa-solid fa-circle-check"></i> Concluir Cadastro
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
