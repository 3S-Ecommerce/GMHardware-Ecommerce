<section class="preencha-endereco">
    <h2 i18n>Preencha seu endereço</h2>
    <div class="form-endereco">
        <form [formGroup]="formEndereco">
            <div class="div-input w100">
                <label for="cep" i18n>CEP:</label>
                <input type="text" name="" id="cep" i18n-placeholder placeholder="ex: 04124-012" required>
            </div>
            <div class="div-input w70">
                <label for="rua" i18n>Rua/Avenida</label>
                <input type="text" name="" id="rua" class="w70" i18n-placeholder placeholder="ex: Rua Marlene Dietrich" required>
            </div>
            <div class="div-input w30">
                <label for="numero" i18n>Número:</label>
                <input type="text" name="" id="numero" class="w30" i18n-placeholder placeholder="ex: 81" required>
            </div>
            <div class="div-input w100">
                <label for="complemento" i18n>Complemento:</label>
                <input type="text" name="" id="complemento" i18n-placeholder placeholder="ex: Casa amarela com botão branco" required>
            </div>
            <div class="div-input w100">
                <label for="info" i18n>Informações adicionais:</label>
                <input type="text" name="" id="info" class="w100" i18n-placeholder placeholder="Chamar na casa ao lado">
            </div>
            <div class="div-input w70">
                <label for="nome" i18n>Nome do recebedor:</label>
                <input type="text" name="" id="nome" i18n-placeholder placeholder="Pedro Gregorio" required>
            </div>
            <div class="div-input w30">
                <label for="cpf" i18n>CPF:</label>
                <input type="text" name="" id="cpf" i18n-placeholder placeholder="ex: 9999999999" required>
            </div>
            <div class="button">
                <a routerLink="/finalizar-compra" class="voltar" i18n>Voltar</a>
                <button type="submit" i18n>Salvar</button>
            </div>
        </form>
    </div>
</section>
