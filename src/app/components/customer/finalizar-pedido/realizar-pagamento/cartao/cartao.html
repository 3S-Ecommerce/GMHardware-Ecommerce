<section class="cadastrar-cartao">
    <h2 i18n>Dados do cartão</h2>
    <div class="form-cartao">
        <form action="">
            <div class="div-input w100">
                <label for="nome" i18n>Nome do titular:</label>
                <input type="text" name="" id="nome" i18n-placeholder placeholder="ex: Pedro Gregorio" required>
            </div>
            <div class="div-input w100">
                <label for="numero" i18n>Número do cartão:</label>
                <input type="number" name="" id="numero" i18n-placeholder placeholder="ex: 0123 4567 8901 2345" required>
            </div>
            <div class="div-input w25">
                <label for="vencimento" i18n>Vencimento:</label>
                <input type="text" name="" id="complemento" i18n-placeholder placeholder="ex: 00/00" required>
            </div>
            <div class="div-input w25">
                <label for="cvv" i18n>CVV:</label>
                <input type="number" name="" id="cvv" i18n-placeholder placeholder="ex: 123" required>
            </div>
            <div class="div-input w40">
                <label for="cpf" i18n>CPF:</label>
                <input type="number" name="" id="cpf" i18n-placeholder placeholder="ex: 123 321 123 10" required>
            </div>
            <div class="button">
                <button type="submit" i18n>Finalizar Compra</button>
            </div>
        </form>
    </div>
</section>
