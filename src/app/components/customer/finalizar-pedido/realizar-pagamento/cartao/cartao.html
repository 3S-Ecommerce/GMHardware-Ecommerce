<section class="cadastrar-cartao">
    <h2>Dados do cartão</h2>
    <div class="form-cartao">
        <form [formGroup]="formCartao" (ngSubmit)="onSubmit()">
            <div class="div-input w100">
                <label for="nome">Nome do titular:</label>
                <!-- 2. Adicionamos o formControlName -->
                <input type="text" formControlName="nome_titular" id="nome" placeholder="ex: Pedro Gregorio" required>
            </div>
            <div class="div-input w100">
                <label for="numero">Numero do cartão:</label>
                <input type="text" formControlName="numero_cartao" id="numero" placeholder="ex: 0123 4567 8901 2345" required>
            </div>
            <div class="div-input w25">
                <label for="vencimento">Vencimento:</label>
                <input type="text" formControlName="vencimento" id="vencimento" placeholder="ex: 00/00" required>
            </div>
            <div class="div-input w25">
                <label for="cvv">CVV:</label>
                <input type="text" formControlName="cvv" id="cvv" placeholder="ex: 123" required>
            </div>
            <div class="div-input w40">
                <label for="cpf">CPF:</label>
                <input type="text" formControlName="cpf" id="cpf" placeholder="ex: 123 321 123 10" required>
            </div>
            <div class="button">
                <!-- 3. O botão deve ser submit -->
                <button type="submit" [disabled]="formCartao.invalid">Finalizar Compra</button>
            </div>
        </form>
    </div>
</section>
