<section class="cadastrar-cartao">
    <h2 id="pagamentoCartaoTitulo">Dados do cartão</h2>
    <div class="form-cartao">
        <form action="">
            <div class="div-input w100">
                <label for="nome" id="pagamentoCartaoNomeTitular">Nome do titular:</label>
                <input type="text" name="" id="nome" placeholder="ex: Pedro Gregorio" required>
            </div>
            <div class="div-input w100">
                <label for="numero" id="pagamentoCartaoNumeroCartao">Número do cartão:</label>
                <input type="number" name="" id="numero" placeholder="ex: 0123 4567 8901 2345" required>
            </div>
            <div class="div-input w25">
                <label for="vencimento" id="pagamentoCartaoVencimento">Vencimento:</label>
                <input type="text" name="" id="complemento" placeholder="ex: 00/00" required>
            </div>
            <div class="div-input w25">
                <label for="cvv" id="pagamentoCartaoCvv">CVV:</label>
                <input type="number" name="" id="cvv" placeholder="ex: 123" required>
            </div>
            <div class="div-input w40">
                <label for="cpf" id="pagamentoCartaoCpf">CPF:</label>
                <input type="number" name="" id="cpf" placeholder="ex: 123 321 123 10" required>
            </div>
            <div class="button">
                <button type="submit" id="pagamentoCartaoBtnFinalizar">Finalizar Compra</button>
            </div>
        </form>
    </div>
</section>
