<section class="pix">
    <h2 id="pagamentoPixMensagemValor">Pague R$ 9999,99 pelo pix abaixo:</h2>
    <div class="pix-pagamento">
        <h2 id="pagamentoPixTituloQr">Escaneie o código QR para pagar</h2>
        <p id="pagamentoPixPasso1">1. Acesse seu Internet Banking ou app de pagamentos.</p>
        <p id="pagamentoPixPasso2">2. Escolha pagar via Pix.</p>
        <p id="pagamentoPixPasso3">3. Escaneie o seguinte código:
            <img [src]="qrCodeBase64">

        </p>
        <p>Código pix:
            <textarea readonly>
            {{ qrCode }}
            </textarea>
        </p>
        <br>
       
        <br>
        <h2 id="pagamentoPixTituloCopiaCola">Ou copie este código para fazer o pagamento:</h2>
        <img
            *ngIf="qrCodeBase64"
            [src]="qrCodeBase64"
            width="300"
        >

            <textarea readonly>
             {{ qrCode }}
            </textarea>
    </div>
</section>
