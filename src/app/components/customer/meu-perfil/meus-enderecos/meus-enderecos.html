<div class="meus-enderecos-container">
  <h1 class="enderecos-title">Meus Endereços</h1>
  
   <a routerLink="/meu-perfil" class="btn-voltar">← Voltar para Meu Perfil</a>
  
  <div class="enderecos-list">
    <!-- Card Endereço 1 -->
    <div class="endereco-item">
      <div class="endereco-icon">
        <img src="/assets/icones-perfil/endereco.png" alt="Ícone Endereço">
      </div>
      
      <div class="endereco-info">
        <h2 class="endereco-titulo">Rua Marlene Dietrich 81</h2>
        <p class="endereco-cep">CEP 04814555 - São Paulo - SP</p>
        <p class="endereco-tipo">Endereço Residencial</p>
        <p class="endereco-contato">Arthur Cavalcante de Souza - (11) 91036-9845</p>
      </div>
      
      <button class="endereco-excluir" (click)="excluirEndereco(1)">
        Excluir
      </button>
    </div>

    <!-- Card Endereço 2 -->
    <div class="endereco-item">
      <div class="endereco-icon">
        <img src="/assets/icones-perfil/endereco.png" alt="Ícone Endereço">
      </div>
      
      <div class="endereco-info">
        <h2 class="endereco-titulo">Rua Marlene Dietrich 81</h2>
        <p class="endereco-cep">CEP 04814555 - São Paulo - SP</p>
        <p class="endereco-tipo">Endereço Residencial</p>
        <p class="endereco-contato">Arthur Cavalcante de Souza - (11) 91036-9845</p>
      </div>
      
      <button class="endereco-excluir" (click)="excluirEndereco(2)">
        Excluir
      </button>
    </div>
  </div>

  <!-- Botão Adicionar Endereço -->
  <div class="enderecos-actions">
    <button class="btn-adicionar" (click)="adicionarEndereco()">
      <span class="btn-icon">+</span>
      Adicionar Novo Endereço
    </button>
  </div>
</div>
