<div class="meu-perfil-container">
  <h1 class="perfil-title">Meu Perfil</h1>

  <div class="perfil-grid">
    <!-- Card Endereço -->
    @if(!adminLogado()){
    <a routerLink="/perfil" class="perfil-card">
      <div class="card-icon">
        <img src="/assets/icones-meuperfil/cartao.png" alt="Cartão">
      </div>
      <div class="card-content">
        <h2 class="card-title">Meus dados</h2>
        <p class="card-description">Verificar e alterar meus dados</p>
      </div>
    </a>
    }

    <a routerLink="/meus-enderecos" class="perfil-card">
      <div class="card-icon">
        <img src="/assets/icones-meuperfil/endereco.png" alt="Endereço">
      </div>
      <div class="card-content">
        <h2 class="card-title">Endereço</h2>
        <p class="card-description">Endereços salvos na conta</p>
      </div>
    </a>

    <!-- Card Compras -->
    <a routerLink="/minhas-compras" class="perfil-card">
      <div class="card-icon">
        <img src="/assets/icones-meuperfil/compras.png" alt="Compras">
      </div>
      <div class="card-content">
        <h2 class="card-title">Compras</h2>
        <p class="card-description">Suas compras</p>
      </div>
    </a>

    <!-- Card Cartão de Crédito -->
    <a routerLink="/meus-cartoes" class="perfil-card">
      <div class="card-icon">
        <img src="/assets/icones-meuperfil/cartao.png" alt="Cartão">
      </div>
      <div class="card-content">
        <h2 class="card-title">Cartão de Crédito</h2>
        <p class="card-description">Cartões salvos na conta</p>
      </div>
    </a>
    @if(adminLogado()){
    <a routerLink="/admin" class="perfil-card">
      <div class="card-icon">
        <img src="/assets/icones-meuperfil/cartao.png" alt="Cartão">
      </div>
      <div class="card-content">
        <h2 class="card-title">Acessar área de admin</h2>
        <p class="card-description">Acessar área de administrador</p>
      </div>
    </a>
    }



    <!-- Card Sair -->
    <!-- Card Sair -->
    <a (click)="logout()" class="perfil-card logout-card" style="cursor: pointer;">
      <div class="card-icon">
        <img src="/assets/icones-meuperfil/sair.png" alt="Sair">
      </div>
      <div class="card-content">
        <h2 class="card-title">Sair</h2>
        <p class="card-description">Sair da sua conta</p>
      </div>
    </a>
  </div>
</div>
