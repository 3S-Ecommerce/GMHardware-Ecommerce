<section class="perfil-dashboard">
  <h1>Meu Perfil</h1>
  <div class="container-cards">
    <!-- Card Endereço -->
    <div class="card-item" routerLink="/meus-enderecos">
      <div class="icon-box">
        <img src="assets/icons/location.svg" alt="Ícone Endereço">
      </div>
      <div class="content">
        <h2>Endereço</h2>
        <p>Endereços salvos na conta</p>
      </div>
    </div>

    <div class="card-item" routerLink="/minhas-compras">
      <div class="icon-box">
        <img src="assets/icons/cart.svg" alt="Ícone Compras">
      </div>
      <div class="content">
        <h2>Compras</h2>
        <p>Suas compras</p>
      </div>
    </div>

    <!-- Card Cartão -->
    <div class="card-item" routerLink="/meus-cartoes">
      <div class="icon-box">
        <img src="assets/icons/card.svg" alt="Ícone Cartão">
      </div>
      <div class="content">
        <h2>Cartão de Crédito</h2>
        <p>Cartões salvos na conta</p>
      </div>
    </div>

    <!-- Card Sair -->
    <div class="card-item">
      <div class="icon-box">
        <img src="assets/icons/logout.svg" alt="Ícone Sair">
      </div>
      <div class="content">
        <h2>Sair</h2>
        <p>Sair da sua conta</p>
      </div>
    </div>
  </div>
      <router-outlet></router-outlet>
</section>
